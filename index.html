<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DayBook — Cash Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#14213D; --navy-2:#1D2E52; --paper:#FBF8F2; --paper-2:#F3EEE1;
    --rule:#DCD3BC; --green:#1F6E43; --green-bg:#E7F1EA; --rust:#A8432A; --rust-bg:#F5E7E0;
    --brass:#B08D57; --charcoal:#2A2A28; --muted:#8A8270; --muted-2:#9AA3BD;
    --radius:10px; --shadow:0 6px 20px rgba(20,33,61,0.12);
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:var(--sans); background:var(--navy); color:var(--charcoal);
    -webkit-font-smoothing:antialiased;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}
  button{font-family:inherit; cursor:pointer;}
  input,select,textarea{font-family:inherit; font-size:15px;}
  ::selection{background:var(--brass); color:#fff;}

  /* ---------- Login ---------- */
  .login-screen{
    flex:1; display:flex; align-items:center; justify-content:center; padding:24px;
    background:
      repeating-linear-gradient(180deg, transparent, transparent 27px, rgba(255,255,255,0.035) 28px),
      radial-gradient(circle at 20% 15%, #1E3057 0%, var(--navy) 55%);
  }
  .login-card{
    width:100%; max-width:380px; background:var(--paper); border-radius:14px;
    box-shadow:var(--shadow); padding:36px 30px 30px; position:relative; overflow:hidden;
  }
  .login-card::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:6px;
    background:linear-gradient(180deg,var(--brass),var(--rust));
  }
  .brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
  .brand svg{flex-shrink:0;}
  .brand h1{font-family:var(--serif); font-size:26px; font-weight:600; margin:0; color:var(--navy);}
  .brand-sub{font-size:12.5px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; margin:0 0 26px 56px;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:6px; letter-spacing:.02em;}
  .field select, .field input{
    width:100%; padding:11px 12px; border:1.5px solid var(--rule); border-radius:8px;
    background:#fff; color:var(--charcoal); outline:none; transition:border-color .15s;
  }
  .field select:focus, .field input:focus{border-color:var(--brass);}
  .btn{
    width:100%; padding:12px; border:none; border-radius:8px; font-weight:600; font-size:15px;
    background:var(--navy); color:#fff; transition:transform .1s, background .15s;
  }
  .btn:active{transform:scale(.98);}
  .btn:hover{background:var(--navy-2);}
  .btn.ghost{background:transparent; color:var(--navy); border:1.5px solid var(--rule);}
  .btn.small{width:auto; padding:8px 14px; font-size:13px;}
  .btn.outward{background:var(--rust);}
  .btn.inward{background:var(--green);}
  .error-msg{color:var(--rust); font-size:13px; margin:-6px 0 14px; font-weight:500;}
  .demo-flag{
    margin-top:18px; font-size:11.5px; color:var(--muted); text-align:center;
    background:var(--paper-2); border-radius:6px; padding:8px 10px; line-height:1.5;
  }

  /* ---------- App chrome ---------- */
  .topbar{
    background:var(--navy); color:#fff; padding:14px 20px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:10;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .topbar .brand h1{color:#fff; font-size:19px;}
  .topbar .brand-row{display:flex; align-items:center; gap:9px;}
  .who{display:flex; align-items:center; gap:10px; font-size:13px;}
  .who .name{font-weight:600;}
  .role-badge{
    font-size:10px; text-transform:uppercase; letter-spacing:.05em; background:var(--brass);
    color:#fff; padding:3px 7px; border-radius:20px; font-weight:700;
  }
  .logout{background:none; border:none; color:var(--muted-2); font-size:12.5px; text-decoration:underline;}

  .layout{flex:1; display:flex; max-width:1100px; width:100%; margin:0 auto;}
  .sidenav{
    width:190px; padding:22px 12px; display:none; flex-direction:column; gap:4px;
    border-right:1px solid rgba(255,255,255,0.06);
  }
  .nav-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
    color:var(--muted-2); background:none; border:none; font-size:14px; font-weight:600; text-align:left;
  }
  .nav-item.active{background:rgba(255,255,255,.08); color:#fff;}
  .nav-item .tab-num{font-family:var(--mono); font-size:11px; opacity:.6;}

  main{flex:1; padding:20px 16px 90px; background:var(--paper); min-height:calc(100vh - 58px);}
  @media(min-width:760px){
    main{padding:28px 32px 40px; border-radius:16px 0 0 0;}
    .sidenav{display:flex;}
    .bottomnav{display:none !important;}
  }

  .bottomnav{
    position:fixed; bottom:0; left:0; right:0; background:var(--navy); display:flex;
    justify-content:space-around; padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    box-shadow:0 -4px 14px rgba(0,0,0,.2); z-index:10;
  }
  .bottomnav .nav-item{flex-direction:column; gap:3px; font-size:11px; padding:6px 10px; text-align:center;}

  h2.section-title{font-family:var(--serif); font-size:22px; color:var(--navy); margin:0 0 4px;}
  .section-sub{color:var(--muted); font-size:13.5px; margin:0 0 22px;}

  /* ---------- Cards / ledger sheet feel ---------- */
  .card{
    background:#fff; border:1px solid var(--rule); border-radius:var(--radius);
    padding:20px; margin-bottom:16px;
  }
  .ledger-lines{
    background-image:repeating-linear-gradient(180deg, transparent, transparent 43px, var(--rule) 44px);
  }

  .toggle-row{display:flex; gap:8px; margin-bottom:16px;}
  .toggle-btn{
    flex:1; padding:11px 6px; border-radius:8px; border:1.5px solid var(--rule); background:#fff;
    font-weight:600; font-size:13.5px; color:var(--muted); transition:all .15s; white-space:nowrap;
  }
  .toggle-btn.active.inward{background:var(--green-bg); border-color:var(--green); color:var(--green);}
  .toggle-btn.active.outward{background:var(--rust-bg); border-color:var(--rust); color:var(--rust);}
  .toggle-btn.active.handover{background:#EAE3F5; border-color:var(--brass); color:var(--brass);}

  .amount-input-wrap{position:relative;}
  .amount-input-wrap .rupee{position:absolute; left:12px; top:50%; transform:translateY(-50%); font-family:var(--mono); font-weight:600; color:var(--muted);}
  .amount-input-wrap input{padding-left:28px; font-family:var(--mono); font-size:17px; font-weight:600;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}

  /* success stub / torn receipt */
  .receipt-toast{
    display:flex; align-items:center; gap:12px; background:var(--green-bg); border:1px dashed var(--green);
    border-radius:8px; padding:14px 16px; margin-bottom:18px; position:relative;
    animation:slideIn .25s ease;
  }
  .receipt-toast.err{background:var(--rust-bg); border-color:var(--rust);}
  @keyframes slideIn{from{opacity:0; transform:translateY(-6px);} to{opacity:1; transform:translateY(0);}}

  /* entry rows */
  .entry-row{
    display:flex; align-items:center; justify-content:space-between; padding:13px 4px;
    border-bottom:1px solid var(--rule);
  }
  .entry-row:last-child{border-bottom:none;}
  .entry-main{display:flex; flex-direction:column; gap:3px; min-width:0;}
  .entry-desc{font-weight:600; font-size:14.5px; color:var(--charcoal); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:210px;}
  .entry-meta{font-size:12px; color:var(--muted); display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .pill{background:var(--paper-2); padding:2px 8px; border-radius:20px; font-size:11px; font-weight:600;}
  .amt{font-family:var(--mono); font-weight:700; font-size:15px; white-space:nowrap;}
  .amt.in{color:var(--green);}
  .amt.out{color:var(--rust);}

  .stamp{
    display:inline-block; border:2px solid var(--green); color:var(--green); font-family:var(--mono);
    font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; transform:rotate(-6deg);
    letter-spacing:.06em; text-transform:uppercase;
  }
  .stamp.pending{border-color:var(--brass); color:var(--brass);}

  /* stats */
  .stat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px;}
  @media(min-width:600px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
  .stat{background:#fff; border:1px solid var(--rule); border-radius:var(--radius); padding:16px;}
  .stat .label{font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); font-weight:600; margin-bottom:6px;}
  .stat .val{font-family:var(--mono); font-size:20px; font-weight:700; color:var(--navy);}

  .filters{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px;}
  .filters select, .filters input{padding:8px 10px; border:1.5px solid var(--rule); border-radius:7px; font-size:13px; background:#fff;}

  .bar-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .bar-label{width:150px; font-size:13px; font-weight:600; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .bar-track{flex:1; background:var(--paper-2); border-radius:6px; height:16px; overflow:hidden;}
  .bar-fill{height:100%; background:linear-gradient(90deg,var(--brass),var(--navy)); border-radius:6px;}
  .bar-val{font-family:var(--mono); font-size:12.5px; width:76px; text-align:right; flex-shrink:0; color:var(--muted);}

  .empty-state{text-align:center; padding:50px 20px; color:var(--muted);}
  .empty-state svg{margin-bottom:12px; opacity:.5;}
  .empty-state .t{font-family:var(--serif); font-size:17px; color:var(--navy); margin-bottom:4px;}

  textarea{width:100%; padding:11px 12px; border:1.5px solid var(--rule); border-radius:8px; resize:vertical; min-height:60px;}
</style>
</head>

/* ============ API ============ */
const isDemo = () => !CONFIG.API_URL;

async function api(action, params) {
  if (isDemo()) return demoApi(action, params);
  const res = await fetch(CONFIG.API_URL, {
    method: 'POST',
    body: JSON.stringify({ action, ...params }),
  });
  return res.json();
}

function demoApi(action, params) {
  return new Promise((resolve) => setTimeout(() => {
    if (action === 'login') {
      const key = (params.name || '').trim().toLowerCase();
      const rec = DEMO_LOGINS[key];
      if (rec && rec.pin === params.pin) resolve({ ok: true, name: params.name, role: rec.role });
      else resolve({ ok: false, error: 'Name or PIN not recognized' });
    } else if (action === 'getMeta') {
      resolve({ ok: true, ...DEMO_META });
    } else if (action === 'addExpense') {
      const inward = parseFloat(params.inward) || 0, outward = parseFloat(params.outward) || 0;
      const last = demoEntries[0] ? demoEntries[0].balance : 0;
      const balance = last + inward - outward;
      const entry = { row: demoEntries.length + 1, date: params.date, description: params.description,
        category: params.category, inward, outward, paymentMethod: params.paymentMethod, balance,
        remarks: params.remarks || '', loggedBy: params.loggedBy, timestamp: new Date().toISOString(), status: 'Pending',
        handedTo: params.recipient || '' };
      demoEntries = [entry, ...demoEntries];
      resolve({ ok: true, balance });
    } else if (action === 'listEntries') {
      let list = demoEntries;
      if (params.loggedBy) list = list.filter(e => e.loggedBy === params.loggedBy);
      resolve({ ok: true, entries: list });
    } else if (action === 'updateStatus') {
      const e = demoEntries.find(e => e.row === params.row);
      if (e) e.status = params.status;
      resolve({ ok: true });
    } else if (action === 'changePin') {
      const key = (params.name || '').trim().toLowerCase();
      const rec = DEMO_LOGINS[key];
      if (rec && rec.pin === params.oldPin) {
        if (!params.newPin || params.newPin.length < 4) resolve({ ok: false, error: 'New PIN must be at least 4 digits.' });
        else { rec.pin = params.newPin; resolve({ ok: true }); }
      } else resolve({ ok: false, error: 'Current PIN did not match. PIN not changed.' });
    }
  }, 220));
}

const rupee = (n) => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 2 });

const todayISO = () => new Date().toISOString().slice(0,10);
function minAllowedDate(role){
  const days = role === 'admin' ? 90 : 7;
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString().slice(0,10);
}
function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

const screens = {};

screens.login = function () {

  document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="login-card">
        <div class="brand"><img src="${LOGO_URI}" alt="PowerBridge Global" style="width:44px; height:44px; border-radius:50%; flex-shrink:0;"><h1>DayBook</h1></div>
        <p class="brand-sub">PowerBridge Global · Daily Cash Ledger</p>
        <div class="field">
          <label>Your name</label>
          <select id="loginName">

            ${meta.team.map(n => `<option value="${n}">${n}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>PIN</label>
          <input id="loginPin" type="password" inputmode="numeric" maxlength="6" placeholder="••••">

      </div>
    </div>`;
  document.getElementById('loginBtn').onclick = doLogin;
  document.getElementById('loginPin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin(){
  const name = document.getElementById('loginName').value;
  const pin = document.getElementById('loginPin').value;
  if (!name || !pin) { setState({ loginError: 'Pick your name and enter your PIN.' }); return; }
  setState({ loading: true, loginError: '' });
  const res = await api('login', { name, pin });
  if (res.ok) {
    const metaRes = await api('getMeta', {});
    setState({ loading: false, session: { name: res.name, role: res.role }, meta: metaRes, screen: 'log' });
  } else {
    setState({ loading: false, loginError: res.error || 'Could not log in.' });
  }
}

function logout(){ setState({ screen: 'login', session: null, entries: [], loginError: '' }); }

function chrome(activeKey, contentHtml){
  const admin = state.session.role === 'admin';
  const navItems = [
    { key:'log', label:'Log Expense', icon: ICONS.plus },
    { key:'mine', label:'My Entries', icon: ICONS.list },
  ];
  if (admin) navItems.push({ key:'review', label:'Review', icon: ICONS.check }, { key:'reports', label:'Reports', icon: ICONS.chart });

  const navHtml = navItems.map((n,i) => `
    <button class="nav-item ${activeKey===n.key?'active':''}" data-nav="${n.key}">
      ${n.icon}<span>${n.label}</span><span class="tab-num" style="margin-left:auto">0${i+1}</span>
    </button>`).join('');
  const bottomNavHtml = navItems.map(n => `
    <button class="nav-item ${activeKey===n.key?'active':''}" data-nav="${n.key}">${n.icon}<span>${n.label}</span></button>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="brand-row"><img src="${LOGO_URI}" alt="PowerBridge Global" style="width:32px; height:32px; border-radius:50%; flex-shrink:0;"><h1>DayBook</h1></div>
      <div class="who">
        <span class="name">${state.session.name}</span>
        <span class="role-badge">${state.session.role}</span>
        <button class="logout" id="pinBtn" style="margin-right:2px;">Change PIN</button>
        <button class="logout" id="logoutBtn">Sign out</button>
      </div>
    </div>
    <div class="layout">
      <nav class="sidenav">${navHtml}</nav>
      <main>${contentHtml}</main>
    </div>
    <nav class="bottomnav">${bottomNavHtml}</nav>
  `;
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('pinBtn').onclick = () => setState({ screen: 'changepin', prevScreen: activeKey, pinMsg: null });
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.onclick = () => setState({ screen: btn.dataset.nav });
  });
}

/* ---- CHANGE PIN ---- */
screens.changepin = function(){
  chrome(state.prevScreen || 'log', `
    <h2 class="section-title">Change your PIN</h2>
    <p class="section-sub">Only you should know this — pick something you'll remember.</p>
    ${state.pinMsg ? `<div class="receipt-toast ${state.pinMsg.err?'err':''}">${state.pinMsg.err?'⚠️':'✓'} <span>${state.pinMsg.text}</span></div>` : ''}
    <div class="card" style="max-width:360px;">
      <div class="field"><label>Current PIN</label><input id="cp_old" type="password" inputmode="numeric" maxlength="6" placeholder="••••"></div>
      <div class="field"><label>New PIN</label><input id="cp_new" type="password" inputmode="numeric" maxlength="6" placeholder="At least 4 digits"></div>
      <div class="field"><label>Confirm new PIN</label><input id="cp_confirm" type="password" inputmode="numeric" maxlength="6" placeholder="Re-type new PIN"></div>
      <button class="btn" id="pinSubmit">${state.loading ? 'Saving…' : 'Update PIN'}</button>
      <button class="btn ghost" style="margin-top:8px;" id="pinCancel">Cancel</button>
    </div>
  `);
  document.getElementById('pinCancel').onclick = () => setState({ screen: state.prevScreen || 'log' });
  document.getElementById('pinSubmit').onclick = submitPinChange;
};

async function submitPinChange(){
  const oldPin = document.getElementById('cp_old').value.trim();
  const newPin = document.getElementById('cp_new').value.trim();
  const confirm = document.getElementById('cp_confirm').value.trim();
  if (!oldPin || !newPin) { setState({ pinMsg: { err:true, text:'Fill in your current PIN and a new PIN.' } }); return; }
  if (newPin.length < 4) { setState({ pinMsg: { err:true, text:'New PIN must be at least 4 digits.' } }); return; }
  if (newPin !== confirm) { setState({ pinMsg: { err:true, text:"New PIN and confirmation don't match." } }); return; }
  setState({ loading:true, pinMsg:null });
  const res = await api('changePin', { name: state.session.name, oldPin, newPin });
  if (res.ok) setState({ loading:false, pinMsg: { err:false, text:'PIN updated. Use your new PIN next time you log in.' } });
  else setState({ loading:false, pinMsg: { err:true, text: res.error || 'Could not update PIN.' } });
}

        </div>
        <div class="field">
          <label>Amount</label>
          <div class="amount-input-wrap"><span class="rupee">₹</span><input id="f_amt" type="number" inputmode="decimal" placeholder="0"></div>
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <label>Payment method</label>
          <select id="f_pay">${meta.paymentMethods.map(p=>`<option ${formType==='handover'&&p==='Cash'?'selected':''}>${p}</option>`).join('')}</select>
        </div>

        </div>
      </div>
      <p style="font-size:11.5px; color:var(--muted); margin:-10px 0 16px;">You can backdate entries up to ${state.session.role==='admin' ? '3 months' : '7 days (1 week)'}.</p>
      <div class="field">
        <label>Remarks <span style="font-weight:400; text-transform:none;">(optional)</span></label>
        <textarea id="f_remarks" placeholder="Site name, split payment note, etc."></textarea>
      </div>
      <button class="btn ${formType==='handover' ? 'outward' : formType}" id="submitBtn">${state.loading ? 'Saving…' : (formType==='inward' ? 'Log cash in' : formType==='handover' ? 'Log handover' : 'Log cash out')}</button>
    </div>
  `);
  document.getElementById('typeOutward').onclick = () => { formType='outward'; render(); };
  document.getElementById('typeInward').onclick = () => { formType='inward'; render(); };
  document.getElementById('typeHandover').onclick = () => { formType='handover'; render(); };
  document.getElementById('submitBtn').onclick = submitExpense;

async function submitExpense(){
  const desc = document.getElementById('f_desc').value.trim();
  const amt = parseFloat(document.getElementById('f_amt').value);
  const cat = formType === 'handover' ? 'Cash Handover' : document.getElementById('f_cat').value;
  const pay = document.getElementById('f_pay').value;
  const date = document.getElementById('f_date').value;
  const remarks = document.getElementById('f_remarks').value.trim();
  const recipient = formType === 'handover' ? document.getElementById('f_recipient').value : '';

  if (formType === 'handover' && !recipient) {
    setState({ toast: { err: true, msg: "Choose who you're handing this cash to." } });
    return;
  }
  const finalDesc = desc || (formType === 'handover' ? `Cash handover to ${recipient}` : '');
  if (!finalDesc || !amt || amt <= 0) {
    setState({ toast: { err: true, msg: 'Add a description and an amount greater than 0.' } });
    return;
  }
  const minDate = minAllowedDate(state.session.role);
  if (date < minDate || date > todayISO()) {
    const limitText = state.session.role === 'admin' ? '3 months' : '7 days';
    setState({ toast: { err: true, msg: `You can only backdate entries up to ${limitText}. Pick a date on or after ${fmtDate(minDate)}.` } });
    return;
  }
  setState({ loading: true, toast: null });
  const payload = {
    date, description: finalDesc, category: cat, paymentMethod: pay, remarks,
    loggedBy: state.session.name, recipient,
    inward: formType === 'inward' ? amt : 0,
    outward: (formType === 'outward' || formType === 'handover') ? amt : 0,
  };
  const res = await api('addExpense', payload);
  if (res.ok) {
    const msg = formType === 'handover'
      ? `Handover of ${rupee(amt)} to ${recipient} logged. Running balance now ${rupee(res.balance)}.`
      : `Saved. Running balance now ${rupee(res.balance)}.`;
    setState({ loading: false, toast: { err:false, msg } });
  } else {
    setState({ loading: false, toast: { err:true, msg: res.error || 'Could not save this entry.' } });
  }
};

function entryRow(e){
  const isIn = (e.inward || 0) > 0;
  const amt = isIn ? e.inward : e.outward;
  return `
    <div class="entry-row">
      <div class="entry-main">
        <div class="entry-desc">${e.description}</div>
        <div class="entry-meta">
          <span class="pill">${e.category}</span>
          <span>${fmtDate(e.date)}</span>
          <span>·</span><span>${e.paymentMethod}</span>
          ${e.loggedBy ? `<span>·</span><span>${e.loggedBy}</span>` : ''}
          ${e.handedTo ? `<span>·</span><span style="color:var(--brass); font-weight:600;">⇄ ${e.handedTo}</span>` : ''}
        </div>
      </div>
      <div style="text-align:right; display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
        <span class="amt ${isIn?'in':'out'}">${isIn?'+':'−'}${rupee(amt)}</span>
        <span class="stamp ${e.status==='Verified'?'':'pending'}">${e.status || 'Pending'}</span>
      </div>
    </div>`;
}

function emptyState(title, sub){
  return `<div class="empty-state">${ICONS.empty}<div class="t">${title}</div><div>${sub}</div></div>`;
}

/* ---- REVIEW (admin) ---- */
let reviewFilters = { status:'', category:'', person:'', from:'', to:'' };
screens.review = async function(){
  chrome('review', `<h2 class="section-title">Review entries</h2><p class="section-sub">Loading…</p>`);
  const res = await api('listEntries', {});
  const all = res.ok ? res.entries : [];
  const meta = state.meta;
  const filtered = all.filter(e => {
    if (reviewFilters.status && e.status !== reviewFilters.status) return false;
    if (reviewFilters.category && e.category !== reviewFilters.category) return false;
    if (reviewFilters.person && e.loggedBy !== reviewFilters.person) return false;
    if (reviewFilters.from && e.date < reviewFilters.from) return false;
    if (reviewFilters.to && e.date > reviewFilters.to) return false;
    return true;
  });
  const totalIn = filtered.reduce((s,e)=>s+(Number(e.inward)||0),0);
  const totalOut = filtered.reduce((s,e)=>s+(Number(e.outward)||0),0);

  chrome('review', `
    <h2 class="section-title">Review entries</h2>
    <p class="section-sub">${filtered.length} of ${all.length} entries · Filter and mark as verified.</p>

    <div class="stat-grid">
      <div class="stat"><div class="label">Cash In</div><div class="val" style="color:var(--green)">${rupee(totalIn)}</div></div>
      <div class="stat"><div class="label">Cash Out</div><div class="val" style="color:var(--rust)">${rupee(totalOut)}</div></div>
      <div class="stat"><div class="label">Net</div><div class="val">${rupee(totalIn-totalOut)}</div></div>
      <div class="stat"><div class="label">Pending review</div><div class="val">${filtered.filter(e=>e.status!=='Verified').length}</div></div>
    </div>

    <div class="filters">
      <select id="filStatus"><option value="">All statuses</option><option ${reviewFilters.status==='Pending'?'selected':''}>Pending</option><option ${reviewFilters.status==='Verified'?'selected':''}>Verified</option></select>
      <select id="filCat"><option value="">All categories</option>${meta.categories.map(c=>`<option ${reviewFilters.category===c?'selected':''}>${c}</option>`).join('')}</select>
      <select id="filPerson"><option value="">All team</option>${meta.team.map(p=>`<option ${reviewFilters.person===p?'selected':''}>${p}</option>`).join('')}</select>
      <input type="date" id="filFrom" value="${reviewFilters.from}">
      <input type="date" id="filTo" value="${reviewFilters.to}">
      <button class="btn ghost small" id="clearFilters">Clear</button>
    </div>

    <div class="card" style="padding:6px 20px;">
      ${filtered.length ? filtered.map(e => reviewRow(e)).join('') : emptyState('No entries match', 'Try widening your filters.')}
    </div>
  `);

  ['filStatus','filCat','filPerson','filFrom','filTo'].forEach(id => {
    document.getElementById(id).onchange = (ev) => {
      const map = { filStatus:'status', filCat:'category', filPerson:'person', filFrom:'from', filTo:'to' };
      reviewFilters[map[id]] = ev.target.value;
      screens.review();
    };
  });
  document.getElementById('clearFilters').onclick = () => { reviewFilters = {status:'',category:'',person:'',from:'',to:''}; screens.review(); };
}

function reviewRow(e){
  const isIn = (e.inward || 0) > 0;
  const amt = isIn ? e.inward : e.outward;
  const verified = e.status === 'Verified';
  return `
    <div class="entry-row">
      <div class="entry-main">
        <div class="entry-desc">${e.description}</div>
        <div class="entry-meta">
          <span class="pill">${e.category}</span><span>${fmtDate(e.date)}</span>
          <span>·</span><span>${e.loggedBy || '—'}</span><span>·</span><span>${e.paymentMethod}</span>
          ${e.handedTo ? `<span>·</span><span style="color:var(--brass); font-weight:600;">⇄ ${e.handedTo}</span>` : ''}
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:12px;">
        <span class="amt ${isIn?'in':'out'}">${isIn?'+':'−'}${rupee(amt)}</span>
        <button class="btn ${verified?'ghost':''} small" data-verify="${e.row}" data-status="${verified?'Pending':'Verified'}" style="${verified?'':'background:var(--green);'}">
          ${verified ? '✓ Verified' : 'Verify'}
        </button>
      </div>
    </div>`;
}

document.addEventListener('click', async (ev) => {
  const btn = ev.target.closest('[data-verify]');
  if (!btn) return;
  const row = btn.dataset.verify, status = btn.dataset.status;
  btn.textContent = '…';
  await api('updateStatus', { row, status });
  screens.review();
});

/* ---- REPORTS (admin) ---- */
screens.reports = async function(){
  chrome('reports', `<h2 class="section-title">Reports</h2><p class="section-sub">Loading…</p>`);
  const res = await api('listEntries', {});
  const all = res.ok ? res.entries : [];
  const totalIn = all.reduce((s,e)=>s+(Number(e.inward)||0),0);
  const totalOut = all.reduce((s,e)=>s+(Number(e.outward)||0),0);

  const byCat = {};
  all.forEach(e => { if (e.outward) byCat[e.category] = (byCat[e.category]||0) + Number(e.outward); });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat = catEntries.length ? catEntries[0][1] : 1;

  const byPay = {};
  all.forEach(e => { const v = Number(e.outward)||0; if (v) byPay[e.paymentMethod] = (byPay[e.paymentMethod]||0) + v; });
  const payEntries = Object.entries(byPay).sort((a,b)=>b[1]-a[1]);
  const maxPay = payEntries.length ? payEntries[0][1] : 1;

  chrome('reports', `
    <h2 class="section-title">Reports</h2>
    <p class="section-sub">Where the cash is going, across ${all.length} logged entries.</p>

    <div class="stat-grid">
      <div class="stat"><div class="label">Total Inward</div><div class="val" style="color:var(--green)">${rupee(totalIn)}</div></div>
      <div class="stat"><div class="label">Total Outward</div><div class="val" style="color:var(--rust)">${rupee(totalOut)}</div></div>
      <div class="stat"><div class="label">Net Balance</div><div class="val">${rupee(totalIn-totalOut)}</div></div>
      <div class="stat"><div class="label">Entries</div><div class="val">${all.length}</div></div>
    </div>

    <div class="card">
      <h3 style="font-family:var(--serif); font-size:16px; margin:0 0 16px; color:var(--navy);">Spend by category</h3>
      ${catEntries.length ? catEntries.map(([cat,val]) => `
        <div class="bar-row">
          <div class="bar-label">${cat}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(val/maxCat*100).toFixed(0)}%"></div></div>
          <div class="bar-val">${rupee(val)}</div>
        </div>`).join('') : emptyState('No spend yet','Outward entries will appear here.')}
    </div>

    <div class="card">
      <h3 style="font-family:var(--serif); font-size:16px; margin:0 0 16px; color:var(--navy);">Spend by payment method</h3>
      ${payEntries.length ? payEntries.map(([pay,val]) => `
        <div class="bar-row">
          <div class="bar-label">${pay}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${(val/maxPay*100).toFixed(0)}%"></div></div>
          <div class="bar-val">${rupee(val)}</div>
        </div>`).join('') : emptyState('No spend yet','')}
    </div>
  `);
};

  render(); // show login immediately with demo names while real data loads
  const metaRes = await api('getMeta', {});
  if (metaRes.ok) setState({ meta: metaRes });
}
init();
